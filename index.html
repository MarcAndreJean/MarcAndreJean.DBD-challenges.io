<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dead by Daylight — Survivor Challenge Roulette</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Share+Tech+Mono&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #111116;
    --surface2: #1a1a22;
    --border: #2a2a35;
    --text: #e8e6f0;
    --text-dim: #8888a0;
    --accent: #e63946;
    --accent-glow: rgba(230, 57, 70, 0.4);
    --gold: #f0a500;
    --green: #4ecdc4;
    --purple: #a855f7;
    --orange: #ff6b35;
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
 
  /* Fog background effect */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(230, 57, 70, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(78, 205, 196, 0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
 
  .app {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }
 
  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header h1 {
    font-family: 'Creepster', cursive;
    font-size: clamp(2.4rem, 6vw, 4rem);
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: 0 0 40px var(--accent-glow), 0 2px 0 #1a0a0c;
    line-height: 1.1;
  }
  .header .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-top: 8px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .header .count {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 12px;
    opacity: 0.6;
  }
 
  /* FILTERS */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 36px;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 18px;
    border-radius: 100px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    transition: all 0.2s;
    user-select: none;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .filter-btn.active[data-diff="easy"] { background: var(--green); border-color: var(--green); box-shadow: 0 0 16px rgba(78,205,196,0.3); }
  .filter-btn.active[data-diff="medium"] { background: var(--gold); border-color: var(--gold); color: #111; box-shadow: 0 0 16px rgba(240,165,0,0.3); }
  .filter-btn.active[data-diff="hard"] { background: var(--orange); border-color: var(--orange); box-shadow: 0 0 16px rgba(255,107,53,0.3); }
  .filter-btn.active[data-diff="nightmare"] { background: var(--purple); border-color: var(--purple); box-shadow: 0 0 16px rgba(168,85,247,0.3); }
 
  /* SPIN BUTTON */
  .spin-section { text-align: center; margin-bottom: 40px; }
  .spin-btn {
    font-family: 'Creepster', cursive;
    font-size: 1.6rem;
    letter-spacing: 3px;
    padding: 18px 56px;
    background: linear-gradient(135deg, var(--accent), #c1121f);
    border: 2px solid var(--accent);
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 4px 30px var(--accent-glow);
    position: relative;
    overflow: hidden;
  }
  .spin-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .spin-btn:hover::after { transform: translateX(100%); }
  .spin-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 40px var(--accent-glow);
  }
  .spin-btn:active { transform: scale(0.97); }
 
  /* RESULT CARD */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 32px;
    margin-bottom: 32px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    overflow: hidden;
  }
  .result-card.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .result-card[data-diff="easy"]::before { background: var(--green); box-shadow: 0 0 20px rgba(78,205,196,0.4); }
  .result-card[data-diff="medium"]::before { background: var(--gold); box-shadow: 0 0 20px rgba(240,165,0,0.4); }
  .result-card[data-diff="hard"]::before { background: var(--orange); box-shadow: 0 0 20px rgba(255,107,53,0.4); }
  .result-card[data-diff="nightmare"]::before { background: var(--purple); box-shadow: 0 0 20px rgba(168,85,247,0.4); }
 
  .result-number {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .result-title {
    font-family: 'Creepster', cursive;
    font-size: 1.8rem;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
    line-height: 1.2;
  }
  .result-desc {
    font-size: 1rem;
    color: var(--text);
    line-height: 1.65;
    margin-bottom: 16px;
    font-weight: 300;
  }
  .result-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 1px;
    padding: 4px 12px;
    border-radius: 4px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .tag-diff {
    color: #fff;
  }
  .tag-diff[data-d="easy"] { background: var(--green); color: #0a0a0c; }
  .tag-diff[data-d="medium"] { background: var(--gold); color: #0a0a0c; }
  .tag-diff[data-d="hard"] { background: var(--orange); }
  .tag-diff[data-d="nightmare"] { background: var(--purple); }
  .tag-type {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
 
  /* HISTORY */
  .history-section {
    margin-top: 48px;
    border-top: 1px solid var(--border);
    padding-top: 32px;
  }
  .history-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 16px;
    text-align: center;
  }
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
    opacity: 0;
    animation: fadeSlide 0.3s forwards;
  }
  .history-item .h-num {
    font-family: 'Share Tech Mono', monospace;
    color: var(--text-dim);
    font-size: 0.7rem;
    min-width: 24px;
  }
  .history-item .h-name {
    flex: 1;
    font-weight: 600;
  }
  .history-item .h-diff {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 3px;
  }
  .h-diff[data-d="easy"] { background: rgba(78,205,196,0.15); color: var(--green); }
  .h-diff[data-d="medium"] { background: rgba(240,165,0,0.15); color: var(--gold); }
  .h-diff[data-d="hard"] { background: rgba(255,107,53,0.15); color: var(--orange); }
  .h-diff[data-d="nightmare"] { background: rgba(168,85,247,0.15); color: var(--purple); }
 
  .clear-btn {
    display: block;
    margin: 16px auto 0;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 20px;
    border-radius: 100px;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 0.75rem;
    transition: all 0.2s;
  }
  .clear-btn:hover { border-color: var(--accent); color: var(--accent); }
 
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }
 
  /* Spinning animation */
  .spinning .result-title {
    animation: flicker 0.08s infinite;
  }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
 
  /* Mobile */
  @media (max-width: 600px) {
    .app { padding: 24px 14px 60px; }
    .result-card { padding: 28px 20px; }
    .spin-btn { padding: 14px 40px; font-size: 1.3rem; }
  }
</style>
</head>

// ——— PERSISTENCE ———
function saveHistory() {
  const data = JSON.stringify(history);
  try { document.cookie = "challengeHistory=" + encodeURIComponent(data) + ";path=/;max-age=31536000;SameSite=Lax"; } catch(e) {}
  try { sessionStorage.setItem("challengeHistory", data); } catch(e) {}
}

function loadHistory() {
  // Try cookie first
  try {
    const match = document.cookie.match(/(?:^|;\s*)challengeHistory=([^;]*)/);
    if (match) {
      const parsed = JSON.parse(decodeURIComponent(match[1]));
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  } catch(e) {}
  // Fall back to session storage
  try {
    const raw = sessionStorage.getItem("challengeHistory");
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  } catch(e) {}
  return [];
}

function clearStoredHistory() {
  try { document.cookie = "challengeHistory=;path=/;max-age=0;SameSite=Lax"; } catch(e) {}
  try { sessionStorage.removeItem("challengeHistory"); } catch(e) {}
}

// ——— APP ———
const app = document.getElementById('app');
 
let activeFilters = { diff: new Set(["easy","medium","hard","nightmare"]), type: new Set(["gameplay","loadout","mixed","meme"]) };
let history = loadHistory();
let currentResult = history.length > 0 ? history[0] : null;
 
function getFiltered() {
  return CHALLENGES.filter(c => activeFilters.diff.has(c.diff) && activeFilters.type.has(c.type));
}
 
function spin() {
  const pool = getFiltered();
  if (pool.length === 0) return;
  // Exclude recent history
  const recentIds = new Set(history.slice(0, 10).map(h => h.id));
  let available = pool.filter(c => !recentIds.has(c.id));
  if (available.length === 0) available = pool;
  const pick = available[Math.floor(Math.random() * available.length)];
  currentResult = pick;
  history.unshift(pick);
  if (history.length > 30) history.pop();
  saveHistory();
  render();
  // Animate
  const card = document.querySelector('.result-card');
  if (card) {
    card.classList.remove('visible');
    setTimeout(() => card.classList.add('visible'), 30);
  }
}
 
function toggleFilter(category, value) {
  const set = activeFilters[category];
  if (set.has(value)) set.delete(value);
  else set.add(value);
  if (set.size === 0) set.add(value); // prevent all-off
  render();
}
 
function clearHistory() {
  history = [];
  currentResult = null;
  clearStoredHistory();
  render();
}
 
function diffLabel(d) {
  return { easy: "Easy", medium: "Medium", hard: "Hard", nightmare: "Nightmare" }[d];
}
function typeLabel(t) {
  return { gameplay: "Gameplay", loadout: "Loadout", mixed: "Mixed", meme: "Meme" }[t];
}
 
function render() {
  const pool = getFiltered();
  app.innerHTML = `
    <div class="header">
      <h1>Survivor Challenge Roulette</h1>
      <div class="subtitle">Dead by Daylight</div>
      <div class="count">${pool.length} challenges in pool · ${CHALLENGES.length} total</div>
    </div>
 
    <div class="filters">
      ${["easy","medium","hard","nightmare"].map(d => `
        <button class="filter-btn ${activeFilters.diff.has(d)?'active':''}" data-diff="${d}" onclick="toggleFilter('diff','${d}')">${diffLabel(d)}</button>
      `).join('')}
      ${["gameplay","loadout","mixed","meme"].map(t => `
        <button class="filter-btn ${activeFilters.type.has(t)?'active':''}" onclick="toggleFilter('type','${t}')">${typeLabel(t)}</button>
      `).join('')}
    </div>
 
    <div class="spin-section">
      <button class="spin-btn" onclick="spin()">⛧ SPIN ⛧</button>
    </div>
 
    ${currentResult ? `
      <div class="result-card visible" data-diff="${currentResult.diff}">
        <div class="result-number">Challenge #${currentResult.id}</div>
        <div class="result-title">${currentResult.name}</div>
        <div class="result-desc">${currentResult.desc}</div>
        <div class="result-tags">
          <span class="tag tag-diff" data-d="${currentResult.diff}">${diffLabel(currentResult.diff)}</span>
          <span class="tag tag-type">${typeLabel(currentResult.type)}</span>
        </div>
      </div>
    ` : `
      <div class="result-card visible" style="text-align:center;opacity:0.5;border-style:dashed;">
        <div class="result-desc">Hit SPIN to receive your fate from the Entity...</div>
      </div>
    `}
 
    ${history.length > 0 ? `
      <div class="history-section">
        <div class="history-title">☠ History ☠</div>
        <div class="history-list">
          ${history.map((h, i) => `
            <div class="history-item" style="animation-delay:${i*0.04}s">
              <span class="h-num">#${h.id}</span>
              <span class="h-name">${h.name}</span>
              <span class="h-diff" data-d="${h.diff}">${diffLabel(h.diff)}</span>
            </div>
          `).join('')}
        </div>
        <button class="clear-btn" onclick="clearHistory()">Clear History</button>
      </div>
    ` : ''}
  `;
}
 
render();
</script>
